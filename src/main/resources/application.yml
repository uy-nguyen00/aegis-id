spring:
    application:
        name: ${APP_NAME}
    config:
        import: optional:file:.env[.properties]
    profiles:
        active: ${SPRING_PROFILES_ACTIVE:dev}
    datasource:
        url: jdbc:postgresql://${DB_URL}:${DB_PORT}/${DB_NAME}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
        database: postgresql
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        show-sql: false
        properties:
            "[hibernate.format_sql]": true
app:
    security:
        jwt:
            private-key: ${JWT_PRIVATE_KEY}
            public-key: ${JWT_PUBLIC_KEY}
            access-token-expiration: 86400000 # 24 hours for local testing, 15mins are recommended for prod
            refresh-token-expiration: 604800000
            issuer: ${JWT_ISSUER:aegis-id}
            audience: ${JWT_AUDIENCE:aegis-api}
        disposable-email-domains: 10minutemail,20minutemail,33mail,5ymail,anonbox,guerrillamail,mailinator,maildrop,mailnesia,moakt,my10minutemail,throwawaymail,trashmail,temp-mail,tempmail,truemail,yopmail
