<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis ID</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="card">
        <h1>Aegis ID</h1>
        <div class="tabs">
            <button class="tab active" data-tab="login">Login</button>
            <button class="tab" data-tab="register">Register</button>
        </div>

        <form id="login-form" class="form">
            <div class="field">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" name="email" required autocomplete="email">
                <span class="field-error"></span>
            </div>
            <div class="field">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required autocomplete="current-password">
                <span class="field-error"></span>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>

        <form id="register-form" class="form hidden">
            <div class="field">
                <label for="reg-firstName">First name</label>
                <input type="text" id="reg-firstName" name="firstName" required minlength="1" maxlength="50" autocomplete="given-name">
                <span class="field-error"></span>
            </div>
            <div class="field">
                <label for="reg-lastName">Last name</label>
                <input type="text" id="reg-lastName" name="lastName" maxlength="50" autocomplete="family-name">
                <span class="field-error"></span>
            </div>
            <div class="field">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" name="email" required autocomplete="email">
                <span class="field-error"></span>
            </div>
            <div class="field">
                <label for="reg-phoneNumber">Phone number</label>
                <input type="tel" id="reg-phoneNumber" name="phoneNumber" placeholder="+1234567890" autocomplete="tel">
                <span class="field-error"></span>
            </div>
            <div class="field">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" name="password" required minlength="8" maxlength="72" autocomplete="new-password">
                <span class="field-error"></span>
            </div>
            <div class="field">
                <label for="reg-confirmPassword">Confirm password</label>
                <input type="password" id="reg-confirmPassword" name="confirmPassword" required autocomplete="new-password">
                <span class="field-error"></span>
            </div>
            <button type="submit" class="btn">Register</button>
        </form>

        <div id="message" class="message hidden"></div>

        <div id="token-result" class="token-result hidden">
            <h3>Authentication tokens</h3>
            <div class="token-field">
                <label>
                    <textarea id="access-token" readonly rows="3"></textarea>
                    Access token
                </label>
            </div>
            <div class="token-field">
                <label>
                    <textarea id="refresh-token" readonly rows="3"></textarea>
                    Refresh token
                </label>
            </div>
            <div class="token-field">
                <label>
                    <input id="token-type" readonly>
                    Token type
                </label>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
