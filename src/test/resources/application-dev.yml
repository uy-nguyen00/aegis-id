spring:
    application:
        name: aegis-id-test
    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: false
        properties:
            "[hibernate.format_sql]": true
app:
    security:
        jwt:
            # These are throwaway test-only RSA keys used solely to bootstrap the Spring context
            # during tests. They are NOT used in production and must never be treated as real keys.
            private-key: 
            public-key: 
            access-token-expiration: 86400000
            refresh-token-expiration: 604800000
            issuer: aegis-id
            audience: aegis-api
            include-roles-claim: true
        disposable-email-domains: 10minutemail,20minutemail,33mail,5ymail,anonbox,guerrillamail,mailinator,maildrop,mailnesia,moakt,my10minutemail,throwawaymail,trashmail,temp-mail,tempmail,truemail,yopmail
