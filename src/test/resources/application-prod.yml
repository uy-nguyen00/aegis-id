spring:
    application:
        name: aegis-id-test
    datasource:
        url: jdbc:h2:mem:aegis_id_prod;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        username: sa
        password:
        driver-class-name: org.h2.Driver
    jpa:
        hibernate:
            ddl-auto: create-drop
        database: h2
        database-platform: org.hibernate.dialect.H2Dialect
        show-sql: false
        properties:
            "[hibernate.format_sql]": true
