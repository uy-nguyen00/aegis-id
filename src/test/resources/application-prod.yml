spring:
    application:
        name: aegis-id-test
    main:
        register-shutdown-hook: false
    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: false
        properties:
            "[hibernate.format_sql]": true
app:
    security:
        jwt:
            private-key-location: classpath:keys/test-private.pem
            public-key-location: classpath:keys/test-public.pem
            access-token-expiration: 86400000
            refresh-token-expiration: 604800000
            issuer: aegis-id
            audience: aegis-api
